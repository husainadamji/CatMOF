# Conda environment for CatMOF: install with
#   conda env create -f devtools/conda-envs/catmof_env.yaml
#   conda activate catmof
# Then from repo root: pip install -e .  (or pip install -e ".[text_mining_titles]" for title fetcher)
name: catmof
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.8.20
  - pip

  - numpy=1.22.3
  - pandas=2.0.3
  - scipy=1.8.1
  - networkx=2.8.8
  - pyyaml=6.0
  - click=8.1.7
  - pymatgen=2020.10.20
  - scikit-learn=0.24.2

  - tensorflow=2.4.1
  - keras=2.4.1

  - beautifulsoup4=4.9.3
  - nltk=3.5
  - regex=2020.6.8
  - requests=2.32.3

  - selenium=4.22.0
  - webdriver-manager=4.0.1

  - molsimplify=1.7.5

  - pytest

  - pip:
    - pybliometrics==4.1
    - autologging==1.3.2
    - articledownloader==9.1.1
